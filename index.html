<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#09090b">
    <link rel="apple-touch-icon" href="https://img.icons8.com/isometric/512/martial-arts-belt.png">
    <link rel="manifest" href="./manifest.json">
    <title>BJJ FLOW - GESTÃO COMPLETA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --purple: #a855f7; }
        body { font-family: 'Inter', sans-serif; background: #0b0b0d; color: #fafafa; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(18, 18, 21, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.03); }
        .input-pro { background: #1a1a1e; border: 1px solid #2d2d33; border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; font-size: 14px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 8px; font-weight: 900; text-transform: uppercase; }
        .pago { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .atrasado { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-purple-600 rounded-xl flex items-center justify-center border border-purple-400/30">
                <span class="text-xl font-black italic text-white">B</span>
            </div>
            <div>
                <h1 id="view-academia" class="text-lg font-black uppercase italic tracking-tighter text-white">BJJ FLOW</h1>
                <p id="view-mestre" class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest italic text-purple-400">MESTRE / PROFESSOR</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="openM('m-aviso')" class="bg-blue-600/20 text-blue-400 p-3 rounded-xl border border-blue-500/30">📢</button>
            <button onclick="openM('m-aluno')" class="bg-purple-600 px-4 py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">+ ATLETA</button>
            <button onclick="openM('m-config')" class="bg-zinc-900 p-3 rounded-xl border border-zinc-800 text-zinc-400">⚙️</button>
        </div>
    </header>

    <section class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="glass p-4 rounded-3xl border-l-4 border-emerald-500">
            <h3 class="text-zinc-500 text-[8px] font-black uppercase">Receita (Mês)</h3>
            <p id="dash-receita" class="text-xl font-black text-emerald-400">R$ 0,00</p>
        </div>
        <div class="glass p-4 rounded-3xl border-l-4 border-blue-500">
            <h3 class="text-zinc-500 text-[8px] font-black uppercase">Vendas Lojinha</h3>
            <p id="dash-loja" class="text-xl font-black text-blue-400">R$ 0,00</p>
        </div>
        <div class="glass p-4 rounded-3xl border-l-4 border-purple-500 col-span-2 overflow-hidden">
            <h3 class="text-zinc-500 text-[8px] font-black uppercase">Horários de Aula</h3>
            <p id="dash-horario" class="text-[9px] font-bold text-zinc-300">Defina os horários no ⚙️</p>
        </div>
    </section>

    <main class="max-w-6xl mx-auto glass rounded-[2.5rem] p-4 overflow-x-auto shadow-2xl">
        <table class="w-full text-left min-w-[1000px]">
            <thead>
                <tr class="text-zinc-600 text-[9px] font-black uppercase border-b border-zinc-800 pb-3">
                    <th class="pb-3">ID / Atleta</th>
                    <th class="pb-3">Idade / Peso</th>
                    <th class="pb-3">Graduação / Unidade</th>
                    <th class="pb-3">Aulas</th>
                    <th class="pb-3">Lojinha</th>
                    <th class="pb-3 text-right">Ações</th>
                </tr>
            </thead>
            <tbody id="lista-alunos" class="divide-y divide-zinc-900"></tbody>
        </table>
    </main>

    <div id="m-aluno" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-xl max-h-[90vh] overflow-y-auto">
            <h2 id="modal-title" class="text-xl font-black uppercase mb-6 text-purple-500 italic">Ficha do Atleta</h2>
            <form onsubmit="saveAluno(event)" class="space-y-4">
                <input type="hidden" id="a-id-edit">
                
                <input type="text" id="a-nome" class="input-pro" placeholder="Nome Completo" required>
                <input type="text" id="a-escola" class="input-pro" placeholder="Academia / Escola Vinculada" required>

                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-zinc-500 ml-2 uppercase italic">Data de Nascimento</label>
                        <input type="date" id="a-nasc" class="input-pro" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-zinc-500 ml-2 uppercase italic">WhatsApp</label>
                        <input type="tel" id="a-zap" class="input-pro" placeholder="Ex: 79999999999" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <input type="number" step="0.1" id="a-peso" class="input-pro" placeholder="Peso Kg (Opcional)">
                    <input type="number" id="a-valor" class="input-pro" placeholder="Mensalidade R$" required>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black text-zinc-500 ml-2 uppercase italic">Meta de Aulas para Próximo Grau</label>
                    <input type="number" id="a-meta" class="input-pro" placeholder="Ex: 50" value="50">
                </div>

                <select id="a-faixa" class="input-pro">
                    <optgroup label="Infantil / Juvenil (Até 15 anos)">
                        <option value="Branca">Branca</option>
                        <option value="Cinza/Branca">Cinza/Branca</option><option value="Cinza">Cinza</option><option value="Cinza/Preta">Cinza/Preta</option>
                        <option value="Amarela/Branca">Amarela/Branca</option><option value="Amarela">Amarela</option><option value="Amarela/Preta">Amarela/Preta</option>
                        <option value="Laranja/Branca">Laranja/Branca</option><option value="Laranja">Laranja</option><option value="Laranja/Preta">Laranja/Preta</option>
                        <option value="Verde/Branca">Verde/Branca</option><option value="Verde">Verde</option><option value="Verde/Preta">Verde/Preta</option>
                    </optgroup>
                    <optgroup label="Adulto">
                        <option value="Azul">Azul</option><option value="Roxa">Roxa</option><option value="Marrom">Marrom</option><option value="Preta">Preta</option>
                    </optgroup>
                </select>

                <button class="w-full bg-purple-600 py-4 rounded-2xl font-black uppercase text-white shadow-xl">Salvar Registro</button>
                <button type="button" onclick="closeM()" class="w-full text-zinc-600 text-[10px] mt-2 font-black uppercase">Voltar</button>
            </form>
        </div>
    </div>

    <div id="m-venda" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-md">
            <h2 class="text-xl font-black uppercase mb-4 italic text-blue-400">🛍️ Registrar Venda</h2>
            <p id="venda-nome-aluno" class="text-[10px] font-black text-zinc-500 mb-6 uppercase italic"></p>
            <input type="hidden" id="venda-id-aluno">
            <select id="venda-produto-select" class="input-pro mb-4"></select>
            <button onclick="confirmarVenda()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase shadow-lg">Confirmar Compra</button>
            <button onclick="closeM()" class="w-full text-zinc-600 text-[10px] mt-4 uppercase font-black text-center">Voltar</button>
        </div>
    </div>

    <div id="m-config" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-black uppercase mb-6 italic text-center">Ajustes do Professor</h2>
            <div class="space-y-6">
                <div>
                    <input type="text" id="c-nome" class="input-pro mb-2" placeholder="Nome da Academia">
                    <input type="text" id="c-mestre" class="input-pro" placeholder="Nome do Professor">
                </div>
                
                <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                    <h3 class="text-[10px] font-black text-blue-400 uppercase mb-3 italic">Estoque da Lojinha</h3>
                    <div id="lista-produtos-config" class="space-y-2 mb-4"></div>
                    <div class="flex gap-2">
                        <input type="text" id="p-novo-nome" class="input-pro !p-2" placeholder="Produto">
                        <input type="number" id="p-novo-preco" class="input-pro !p-2 w-24" placeholder="R$">
                        <button onclick="addProdutoLista()" class="bg-blue-600 px-4 rounded-xl font-black">+</button>
                    </div>
                </div>

                <div id="horarios-lista" class="space-y-1"></div>

                <button onclick="saveConfig()" class="w-full bg-emerald-600 py-4 rounded-xl font-black uppercase shadow-lg">Salvar Tudo</button>
                <button onclick="closeM()" class="w-full text-zinc-600 text-[10px] font-black uppercase text-center">Sair</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4">
        <button onclick="openM('m-checkin')" class="w-full bg-emerald-600 py-6 rounded-[2.5rem] font-black text-xl italic shadow-2xl border border-emerald-400/30">CHECK-IN</button>
    </div>

    <div id="m-checkin" class="modal">
        <div class="glass p-10 rounded-[3rem] w-full max-w-xs text-center">
            <h2 class="text-2xl font-black mb-8 italic">ID INSCRIÇÃO</h2>
            <input type="number" id="check-id" class="input-pro text-center text-5xl font-black h-20 mb-8" placeholder="00">
            <button onclick="doCheckin()" class="w-full bg-emerald-600 py-5 rounded-2xl font-black uppercase shadow-lg">Confirmar Aula</button>
            <button onclick="closeM()" class="w-full text-zinc-600 text-[10px] mt-6 font-black uppercase">Fechar</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bjj_v13_final')) || { 
            config: {nome: 'BJJ FLOW', mestre: 'PROFESSOR', horários: [], produtos: []}, 
            atletas: [] 
        };

        const diasSemana = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo"];
        if(db.config.horários.length === 0) {
            db.config.horários = diasSemana.map(d => ({dia: d, inicio: "", fim: "", ativo: false}));
        }

        function calcularIdade(dataNasc) {
            if (!dataNasc) return "--";
            const hoje = new Date();
            const nasc = new Date(dataNasc);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }

        function openM(id, editId = null) {
            document.getElementById(id).classList.add('active');
            if(id === 'm-config') { renderHorariosConfig(); renderProdutosConfig(); }
            if(id === 'm-venda') {
                const at = db.atletas.find(x => x.id == editId);
                document.getElementById('venda-nome-aluno').innerText = at.nome;
                document.getElementById('venda-id-aluno').value = at.id;
                renderVendaSelect();
            }
            if(editId && id === 'm-aluno') {
                const at = db.atletas.find(x => x.id == editId);
                document.getElementById('a-id-edit').value = at.id;
                document.getElementById('a-nome').value = at.nome;
                document.getElementById('a-escola').value = at.escola;
                document.getElementById('a-nasc').value = at.nasc;
                document.getElementById('a-zap').value = at.zap;
                document.getElementById('a-faixa').value = at.faixa;
                document.getElementById('a-peso').value = at.peso;
                document.getElementById('a-valor').value = at.valor;
                document.getElementById('a-meta').value = at.meta || 50;
            }
        }

        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        function renderProdutosConfig() {
            document.getElementById('lista-produtos-config').innerHTML = db.config.produtos.map(p => `
                <div class="flex justify-between bg-zinc-800 p-2 rounded-xl text-[10px] font-black uppercase">
                    <span>${p.nome} - R$ ${p.preco.toFixed(2)}</span>
                    <button onclick="db.config.produtos=db.config.produtos.filter(x=>x.id!=${p.id});renderProdutosConfig();" class="text-red-500">REMOVER</button>
                </div>`).join('');
        }

        function addProdutoLista() {
            const n = document.getElementById('p-novo-nome').value.toUpperCase();
            const p = parseFloat(document.getElementById('p-novo-preco').value);
            if(n && p) { db.config.produtos.push({id: Date.now(), nome: n, preco: p}); sync(); renderProdutosConfig(); }
        }

        function renderVendaSelect() {
            document.getElementById('venda-produto-select').innerHTML = '<option>Selecione o Produto...</option>' + 
                db.config.produtos.map(p => `<option value="${p.id}">${p.nome} (R$ ${p.preco.toFixed(2)})</option>`).join('');
        }

        function confirmarVenda() {
            const alId = parseInt(document.getElementById('venda-id-aluno').value);
            const prId = parseInt(document.getElementById('venda-produto-select').value);
            const at = db.atletas.find(x => x.id === alId);
            const pr = db.config.produtos.find(x => x.id === prId);
            if(at && pr) { at.lojinha.push({nome: pr.nome, preco: pr.preco, data: new Date().toLocaleDateString()}); sync(); closeM(); }
        }

        function cobrarWpp(id) {
            const at = db.atletas.find(x => x.id === id);
            const sLoja = at.lojinha.reduce((acc, i) => acc + i.preco, 0);
            const msg = window.encodeURIComponent(`🥋 Olá ${at.nome}, passando para informar sua mensalidade (R$ ${at.valor.toFixed(2)}) e pendências da loja (R$ ${sLoja.toFixed(2)}). Total: R$ ${(at.valor + sLoja).toFixed(2)}.`);
            window.open(`https://wa.me/55${at.zap.replace(/\D/g,'')}?text=${msg}`);
        }

        function renderHorariosConfig() {
            document.getElementById('horarios-lista').innerHTML = db.config.horários.map((h, i) => `
                <div class="flex items-center gap-2 bg-zinc-800/30 p-2 rounded-xl text-[10px] font-black uppercase">
                    <input type="checkbox" ${h.ativo ? 'checked' : ''} onchange="db.config.horários[${i}].ativo=this.checked">
                    <span class="w-12">${h.dia.slice(0,3)}</span>
                    <input type="time" value="${h.inicio}" onchange="db.config.horários[${i}].inicio=this.value" class="bg-transparent">
                    <input type="time" value="${h.fim}" onchange="db.config.horários[${i}].fim=this.value" class="bg-transparent">
                </div>`).join('');
        }

        function saveConfig() {
            db.config.nome = document.getElementById('c-nome').value.toUpperCase() || 'BJJ FLOW';
            db.config.mestre = document.getElementById('c-mestre').value.toUpperCase() || 'PROFESSOR';
            sync(); closeM();
        }

        function saveAluno(e) {
            e.preventDefault();
            const editId = document.getElementById('a-id-edit').value;
            const data = {
                id: editId ? parseInt(editId) : (db.atletas.length + 1),
                nome: document.getElementById('a-nome').value.toUpperCase(),
                escola: document.getElementById('a-escola').value.toUpperCase(),
                nasc: document.getElementById('a-nasc').value,
                zap: document.getElementById('a-zap').value,
                faixa: document.getElementById('a-faixa').value,
                peso: document.getElementById('a-peso').value || '-',
                valor: parseFloat(document.getElementById('a-valor').value),
                meta: parseInt(document.getElementById('a-meta').value),
                presenças: editId ? db.atletas.find(x => x.id == editId).presenças : [],
                status: editId ? db.atletas.find(x => x.id == editId).status : 'pago',
                lojinha: editId ? db.atletas.find(x => x.id == editId).lojinha : []
            };
            if(editId) db.atletas[db.atletas.findIndex(x => x.id == editId)] = data;
            else db.atletas.push(data);
            sync(); closeM(); e.target.reset();
        }

        function doCheckin() {
            const id = parseInt(document.getElementById('check-id').value);
            const at = db.atletas.find(x => x.id === id);
            if(at) {
                const hoje = new Date().toLocaleDateString();
                if(!at.presenças.includes(hoje)) { at.presenças.push(hoje); alert(`Check-in: ${at.nome} ✅`); sync(); closeM(); }
                else alert("Já treinou hoje!");
            } else alert("ID inválido!");
        }

        function sync() { localStorage.setItem('bjj_v13_final', JSON.stringify(db)); render(); }

        function render() {
            let tRec = 0, tLoja = 0;
            document.getElementById('view-academia').innerText = db.config.nome;
            document.getElementById('dash-horario').innerText = db.config.horários.filter(h => h.ativo).map(h => `${h.dia.slice(0,3)} ${h.inicio}-${h.fim}`).join(' | ') || "Defina horários no ⚙️";

            document.getElementById('lista-alunos').innerHTML = db.atletas.map(at => {
                const sLoja = at.lojinha.reduce((acc, i) => acc + i.preco, 0);
                tLoja += sLoja; if(at.status === 'pago') tRec += at.valor;
                const idade = calcularIdade(at.nasc);
                const prog = (at.presenças.length / at.meta) * 100;

                return `
                <tr class="text-[11px] border-b border-zinc-900">
                    <td class="py-5 font-black text-white"><span class="text-purple-500 font-mono text-[13px]">#${at.id.toString().padStart(2,'0')}</span><br>${at.nome}</td>
                    <td class="font-bold text-zinc-400 italic uppercase">${idade} ANOS<br><span class="text-zinc-600 font-normal">${at.peso}KG</span></td>
                    <td class="font-bold text-zinc-400 italic uppercase">${at.faixa}<br><span class="text-purple-400 text-[9px]">🏫 ${at.escola}</span></td>
                    <td><span class="text-[9px] font-black uppercase">${at.presenças.length}/${at.meta}</span><br><div class="w-16 h-1 bg-zinc-800 rounded-full"><div class="bg-emerald-500 h-full" style="width:${Math.min(prog,100)}%"></div></div></td>
                    <td><button onclick="openM('m-venda', ${at.id})" class="text-blue-400 font-black">R$ ${sLoja.toFixed(2)}</button></td>
                    <td class="text-right">
                        <button onclick="cobrarWpp(${at.id})" class="text-emerald-500 p-2">💰</button>
                        <button onclick="openM('m-aluno', ${at.id})" class="p-2">✏️</button>
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('dash-receita').innerText = `R$ ${tRec.toFixed(2)}`;
            document.getElementById('dash-loja').innerText = `R$ ${tLoja.toFixed(2)}`;
        }
        render();
    </script>
</body>
</html>
