<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BJJ FLOW PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b0d; color: #fafafa; }
        .glass { background: rgba(18, 18, 21, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .input-pro { background: #1a1a1e; border: 1px solid #333; border-radius: 10px; padding: 10px; color: white; width: 100%; outline: none; font-size: 13px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .btn-edit { color: #60a5fa; font-weight: 800; font-size: 10px; border: 1px solid #1e3a8a; padding: 4px 8px; rounded: 5px; }
        .btn-del { color: #f87171; font-weight: 800; font-size: 10px; border: 1px solid #7f1d1d; padding: 4px 8px; rounded: 5px; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-6">
        <h1 class="text-xl font-black italic text-purple-500">BJJ FLOW PRO</h1>
        <div class="flex gap-2">
            <button onclick="openM('m-financeiro')" class="bg-zinc-900 p-3 rounded-xl border border-zinc-800">💰</button>
            <button onclick="openM('m-mural')" class="bg-zinc-900 p-3 rounded-xl border border-zinc-800">📢</button>
            <button onclick="openM('m-gestao-geral')" class="bg-zinc-900 p-3 rounded-xl border border-zinc-800">⚙️</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-black uppercase italic">Lista de Atletas</h2>
            <button onclick="novoAluno()" class="bg-purple-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase">+ Novo Aluno</button>
        </div>
        
        <div class="glass rounded-3xl p-4 overflow-x-auto">
            <table class="w-full text-left min-w-[1000px]">
                <thead>
                    <tr class="text-zinc-600 text-[10px] font-black uppercase border-b border-zinc-800 pb-2">
                        <th class="pb-2">Nome / ID</th>
                        <th class="pb-2">Idade (Nasc.)</th>
                        <th class="pb-2">Faixa / Unidade</th>
                        <th class="pb-2">Frequência</th>
                        <th class="pb-2">Financeiro</th>
                        <th class="pb-2 text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-alunos" class="divide-y divide-zinc-900"></tbody>
            </table>
        </div>
    </main>

    <div id="m-aluno" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-lg border border-purple-500/30">
            <h2 id="modal-titulo" class="text-xl font-black uppercase italic text-purple-500 mb-6 text-center">Ficha Cadastral</h2>
            <form onsubmit="saveAluno(event)" class="space-y-4">
                <input type="hidden" id="a-id">
                <input type="text" id="a-nome" class="input-pro" placeholder="Nome Completo" required>
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="a-escola" class="input-pro" required></select>
                    <div>
                        <label class="text-[9px] font-bold text-zinc-500">NASCIMENTO MANUAL</label>
                        <input type="date" id="a-nasc" class="input-pro" oninput="calcularIdadePreview()" required>
                        <p id="preview-idade" class="text-[10px] text-purple-400 font-black mt-1 uppercase"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="a-meta" class="input-pro" placeholder="Meta de Aulas">
                    <input type="number" id="a-mensalidade" class="input-pro" placeholder="Mensalidade R$">
                </div>

                <select id="a-faixa" class="input-pro">
                    <optgroup label="Infantil">
                        <option value="Branca">Branca</option>
                        <option value="Cinza/Branca">Cinza e Branca</option>
                        <option value="Cinza">Cinza</option>
                        <option value="Cinza/Preta">Cinza e Preta</option>
                        <option value="Amarela/Branca">Amarela e Branca</option>
                        <option value="Amarela">Amarela</option>
                        <option value="Amarela/Preta">Amarela e Preta</option>
                        <option value="Laranja/Branca">Laranja e Branca</option>
                        <option value="Laranja">Laranja</option>
                        <option value="Laranja/Preta">Laranja e Preta</option>
                        <option value="Verde/Branca">Verde e Branca</option>
                        <option value="Verde">Verde</option>
                        <option value="Verde/Preta">Verde e Preta</option>
                    </optgroup>
                    <optgroup label="Adulto">
                        <option value="Azul">Azul</option>
                        <option value="Roxa">Roxa</option>
                        <option value="Marrom">Marrom</option>
                        <option value="Preta">Preta</option>
                    </optgroup>
                </select>

                <button type="submit" class="w-full bg-purple-600 py-4 rounded-xl font-black uppercase shadow-lg">Confirmar Registro</button>
                <button type="button" onclick="closeM()" class="w-full text-zinc-600 font-black uppercase text-[10px] mt-2">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('BJJ_FLOW_FINAL')) || { escolas: [], atletas: [], produtos: [], mural: "" };

        function openM(id) { document.getElementById(id).classList.add('active'); }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        function novoAluno() {
            document.getElementById('a-id').value = "";
            document.getElementById('modal-titulo').innerText = "Novo Cadastro";
            const sel = document.getElementById('a-escola');
            sel.innerHTML = db.escolas.length ? db.escolas.map(e => `<option value="${e.nome}">${e.nome}</option>`).join('') : '<option value="Padrão">Academia Padrão</option>';
            openM('m-aluno');
        }

        function calcularIdade(dataNasc) {
            const nasc = new Date(dataNasc);
            const hoje = new Date();
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() == nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            return idade || 0;
        }

        function calcularIdadePreview() {
            const data = document.getElementById('a-nasc').value;
            if(data) document.getElementById('preview-idade').innerText = calcularIdade(data) + " ANOS CALCULADOS";
        }

        function saveAluno(e) {
            e.preventDefault();
            const id = document.getElementById('a-id').value;
            const novoAtleta = {
                id: id ? parseInt(id) : Date.now(),
                nome: document.getElementById('a-nome').value.toUpperCase(),
                escola: document.getElementById('a-escola').value,
                nasc: document.getElementById('a-nasc').value,
                meta: parseInt(document.getElementById('a-meta').value) || 0,
                frequencia: id ? db.atletas.find(x => x.id == id).frequencia : 0,
                mensalidade: parseFloat(document.getElementById('a-mensalidade').value) || 0,
                faixa: document.getElementById('a-faixa').value,
                vendas: id ? db.atletas.find(x => x.id == id).vendas : []
            };

            if(id) {
                const idx = db.atletas.findIndex(x => x.id == id);
                db.atletas[idx] = novoAtleta;
            } else {
                db.atletas.push(novoAtleta);
            }
            save(); closeM();
        }

        function editAluno(id) {
            const a = db.atletas.find(x => x.id == id);
            document.getElementById('a-id').value = a.id;
            document.getElementById('a-nome').value = a.nome;
            document.getElementById('a-nasc').value = a.nasc;
            document.getElementById('a-meta').value = a.meta;
            document.getElementById('a-mensalidade').value = a.mensalidade;
            document.getElementById('a-faixa').value = a.faixa;
            document.getElementById('modal-titulo').innerText = "Editando Atleta";
            calcularIdadePreview();
            openM('m-aluno');
        }

        function excluirAluno(id) {
            if(confirm("Tem certeza que deseja excluir este aluno?")) {
                db.atletas = db.atletas.filter(x => x.id !== id);
                save();
            }
        }

        function save() { 
            localStorage.setItem('BJJ_FLOW_FINAL', JSON.stringify(db)); 
            render(); 
        }

        function render() {
            const tbody = document.getElementById('lista-alunos');
            tbody.innerHTML = db.atletas.map(a => `
                <tr class="text-[11px] border-b border-zinc-900">
                    <td class="py-4 font-black text-white uppercase">${a.nome} <br> <span class="text-[8px] text-zinc-600">ID: ${a.id}</span></td>
                    <td class="font-bold text-zinc-400 italic">${calcularIdade(a.nasc)} ANOS <br> <span class="text-[8px]">${a.nasc}</span></td>
                    <td class="font-bold text-zinc-400 uppercase italic">${a.faixa}<br><span class="text-purple-500 text-[8px]">${a.escola}</span></td>
                    <td><span class="text-zinc-500">${a.frequencia} / ${a.meta}</span></td>
                    <td class="text-emerald-500 font-bold">R$ ${a.mensalidade.toFixed(2)}</td>
                    <td class="text-right">
                        <div class="flex gap-2 justify-end">
                            <button onclick="editAluno(${a.id})" class="btn-edit">EDITAR</button>
                            <button onclick="excluirAluno(${a.id})" class="btn-del">EXCLUIR</button>
                        </div>
                    </td>
                </tr>`).join('');
        }

        render();
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('BJJ Flow carregado offline!', reg))
        .catch(err => console.log('Erro no Service Worker', err));
    });
  }
</script></body>
</html>
